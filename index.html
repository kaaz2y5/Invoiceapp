<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mobile Oil Change Invoices</title>
    <meta name="theme-color" content="#0ea5e9" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="InvoiceApp" />
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="apple-touch-icon" href="assets/logo.png" />
    <link rel="stylesheet" href="styles.css" />
    <script src="app.js" defer></script>
  </head>
  <body>
    <main class="app">
      <header class="brand">
        <img id="brandLogo" src="assets/logo.png" alt="" class="logo" />
        <div>
          <h1>Mobile Oil Change Invoice</h1>
          <p class="sub">Fast, iPad-friendly invoice creator that works offline.</p>
        </div>
      </header>

      <section class="card grid">
        <label>Business Name<input id="bizName" value="Your Mobile Oil Change" /></label>
        <label>Phone<input id="bizPhone" placeholder="(555) 555-5555" /></label>
        <label>Invoice #<input id="invoiceNumber" /></label>
        <label>Date<input id="invoiceDate" type="date" /></label>
        <label>Customer Name<input id="customerName" placeholder="Customer" /></label>
        <label>Customer Phone<input id="customerPhone" placeholder="(555) 555-5555" /></label>
      </section>

      <section class="card">
        <h2>Vehicle</h2>
        <div class="grid">
          <label>Vehicle<input id="vehicle" placeholder="Year Make Model" /></label>
          <label>VIN<input id="vin" placeholder="17-character VIN" maxlength="17" /></label>
          <label>License Plate<input id="plate" placeholder="Plate" /></label>
          <label>Mileage<input id="mileage" inputmode="numeric" placeholder="Mileage" /></label>
          <label>Oil Type<input id="oilType" placeholder="Full synthetic 5W-30" /></label>
          <label>Next Service Due<input id="nextService" placeholder="Mileage or date" /></label>
        </div>
      </section>

      <section class="card">
        <div class="section-head">
          <h2>Services</h2>
          <div class="preset-actions" id="presetActions"></div>
        </div>
        <div id="items"></div>
        <button id="addItem" type="button">+ Add Item</button>
      </section>

      <section class="card grid totals-grid">
        <label>Tax %<input id="taxRate" type="number" min="0" step="0.01" value="0" /></label>
        <label>Discount $<input id="discount" type="number" min="0" step="0.01" value="0" /></label>
        <label>Disposal Fee $<input id="disposalFee" type="number" min="0" step="0.01" value="0" /></label>
        <label>Travel Fee $<input id="travelFee" type="number" min="0" step="0.01" value="0" /></label>
      </section>

      <section class="card totals">
        <p>Subtotal: <strong id="subtotal">$0.00</strong></p>
        <p>Fees: <strong id="fees">$0.00</strong></p>
        <p>Discount: <strong id="discountTotal">$0.00</strong></p>
        <p>Tax: <strong id="tax">$0.00</strong></p>
        <p class="grand-total">Total: <strong id="total">$0.00</strong></p>
      </section>

      <section class="card">
        <h2>Payment</h2>
        <div class="payment-options" id="paymentOptions">
          <button type="button" data-payment="Unpaid">Unpaid</button>
          <button type="button" data-payment="Paid Cash">Cash</button>
          <button type="button" data-payment="Paid Card">Card</button>
          <button type="button" data-payment="Paid Zelle/Venmo">Zelle/Venmo</button>
        </div>
        <input id="paymentStatus" type="hidden" value="Unpaid" />
        <p class="payment-display">Status: <strong id="paymentDisplay">Unpaid</strong></p>
      </section>

      <section class="card">
        <h2>Photos</h2>
        <label>Attach Photo<input id="photoInput" type="file" accept="image/*" capture="environment" /></label>
        <div id="photoPreview" class="photo-preview"></div>
      </section>

      <section class="card">
        <div class="section-head">
          <h2>Customer Signature</h2>
          <button id="clearSignature" type="button" class="secondary">Clear</button>
        </div>
        <canvas id="signaturePad" class="signature-pad"></canvas>
      </section>

      <section class="card">
        <h2>Notes</h2>
        <textarea id="notes" placeholder="Filter type, oil quantity, drain plug notes, payment notes, etc."></textarea>
      </section>

      <section class="actions">
        <button id="saveInvoice" type="button">Save Invoice</button>
        <button id="newInvoice" type="button" class="secondary">New Invoice</button>
        <button id="printInvoice" type="button">Print / Save PDF</button>
      </section>

      <section class="card no-print">
        <h2>Saved Invoices</h2>
        <label>Search<input id="invoiceSearch" placeholder="Name, invoice, vehicle, VIN, date" /></label>
        <div id="savedList" class="saved-list"></div>
      </section>
    </main>

    <template id="itemTemplate">
      <div class="item-row">
        <input class="desc" placeholder="Service (e.g., Full Synthetic Oil Change)" />
        <input class="qty" type="number" min="1" value="1" />
        <input class="price" type="number" min="0" step="0.01" value="0" />
        <button class="remove" type="button">Remove</button>
      </div>
    </template>
  </body>
</html>
