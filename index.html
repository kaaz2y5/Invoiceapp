<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mobile Oil Change Invoices</title>
        <meta name="theme-color" content="#0ea5e9" />
    <style>
:root {
  --bg: #f4f7fb;
  --card: #fff;
  --text: #0f172a;
  --accent: #0ea5e9;
}

* { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
body { margin: 0; background: var(--bg); color: var(--text); }
.app { max-width: 900px; margin: 1rem auto 4rem; padding: 0 1rem; }
h1 { margin-bottom: .25rem; }
.sub { margin-top: 0; color: #475569; }
.card {
  background: var(--card);
  border-radius: 12px;
  padding: 1rem;
  margin: 1rem 0;
  box-shadow: 0 8px 20px rgba(15, 23, 42, .08);
}
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: .8rem;
}
label { display: grid; gap: .35rem; font-size: .95rem; }
input {
  padding: .75rem;
  border: 1px solid #cbd5e1;
  border-radius: 10px;
  font-size: 1rem;
}
#items { display: grid; gap: .65rem; margin-bottom: .8rem; }
.item-row { display: grid; grid-template-columns: 1fr 100px 120px auto; gap: .5rem; }
button {
  padding: .7rem .95rem;
  border: 0;
  border-radius: 10px;
  background: var(--accent);
  color: white;
  font-size: .95rem;
}
button.remove { background: #ef4444; }
.actions { display: flex; flex-wrap: wrap; gap: .7rem; }
.totals p { margin: .5rem 0; }

@media print {
  button, .actions { display: none !important; }
  body { background: #fff; }
  .card { box-shadow: none; border: 1px solid #e2e8f0; }
}

.saved-list { display: grid; gap: .6rem; }
.saved-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: .8rem;
  padding: .6rem;
  border: 1px solid #e2e8f0;
  border-radius: 8px;
}
.saved-actions { display: flex; gap: .5rem; }

.brand { display:flex; flex-direction:column; align-items:center; gap:.6rem; }
.logo { width:min(100%,380px); height:auto; border-radius:12px; }

</style>
  </head>
  <body>
    <main class="app">
      <div class="brand">
        <img id="brandLogo" src="assets/logo.png" alt="" class="logo" />
        <h1>Mobile Oil Change Invoice</h1>
      </div>
      <p class="sub">Fast, iPad-friendly invoice creator (works offline)</p>

      <section class="card grid">
        <label>Business Name<input id="bizName" value="Your Mobile Oil Change" /></label>
        <label>Phone<input id="bizPhone" placeholder="(555) 555-5555" /></label>
        <label>Invoice #<input id="invoiceNumber" /></label>
        <label>Date<input id="invoiceDate" type="date" /></label>
        <label>Customer Name<input id="customerName" placeholder="Customer" /></label>
        <label>Vehicle<input id="vehicle" placeholder="Year Make Model" /></label>
      </section>

      <section class="card">
        <h2>Services</h2>
        <div id="items"></div>
        <button id="addItem" type="button">+ Add Item</button>
      </section>

      <section class="card totals">
        <p>Subtotal: <strong id="subtotal">$0.00</strong></p>
        <p>Total: <strong id="total">$0.00</strong></p>
      </section>

      <section class="actions">
        <button id="saveInvoice" type="button">Save Invoice</button>
        <button id="newInvoice" type="button">New Invoice</button>
        <button id="printInvoice" type="button">Print / Save PDF</button>
      </section>

      <section class="card">
        <h2>Saved Invoices (on this device)</h2>
        <div id="savedList" class="saved-list"></div>
      </section>
    </main>

    <template id="itemTemplate">
      <div class="item-row">
        <input class="desc" placeholder="Service (e.g., Full Synthetic Oil Change)" />
        <input class="qty" type="number" min="1" value="1" />
        <input class="price" type="number" min="0" step="0.01" value="0" />
        <button class="remove" type="button">Remove</button>
      </div>
    </template>

    <script>
      (function () {
        const logo = document.getElementById('brandLogo');
        const candidates = ['assets/logo.png', 'assets/logo.jpg', 'assets/logo.jpeg', 'assets/logo.svg'];
        let i = 0;
        logo.onerror = function () {
          i += 1;
          if (i < candidates.length) logo.src = candidates[i];
          else logo.style.display = 'none';
        };
      })();
    </script>
    <script>
const STORAGE_KEY = 'invoiceRecords';
const itemsRoot = document.getElementById('items');
const itemTemplate = document.getElementById('itemTemplate');
const invoiceNumber = document.getElementById('invoiceNumber');
const invoiceDate = document.getElementById('invoiceDate');

if ('serviceWorker' in navigator && (location.protocol === 'https:' || location.hostname === 'localhost' || location.hostname === '127.0.0.1')) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('service-worker.js').catch(() => {});
  });
}

function newInvoiceId() {
  return `INV-${Date.now().toString().slice(-6)}`;
}

function currency(n) {
  return new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' }).format(n || 0);
}

function addItem(data = { desc: '', qty: 1, price: 0 }) {
  const row = itemTemplate.content.firstElementChild.cloneNode(true);
  row.querySelector('.desc').value = data.desc;
  row.querySelector('.qty').value = data.qty;
  row.querySelector('.price').value = data.price;
  row.querySelector('.remove').addEventListener('click', () => {
    row.remove();
    updateTotals();
  });
  row.addEventListener('input', updateTotals);
  itemsRoot.appendChild(row);
}

function getItems() {
  return Array.from(document.querySelectorAll('.item-row')).map((row) => ({
    desc: row.querySelector('.desc').value,
    qty: Number(row.querySelector('.qty').value || 0),
    price: Number(row.querySelector('.price').value || 0),
  }));
}

function updateTotals() {
  const subtotal = getItems().reduce((sum, i) => sum + i.qty * i.price, 0);
  const total = subtotal;
  document.getElementById('subtotal').textContent = currency(subtotal);
  document.getElementById('total').textContent = currency(total);
}

function allFields() {
  return {
    bizName: document.getElementById('bizName').value,
    bizPhone: document.getElementById('bizPhone').value,
    invoiceNumber: invoiceNumber.value,
    invoiceDate: invoiceDate.value,
    customerName: document.getElementById('customerName').value,
    vehicle: document.getElementById('vehicle').value,
    items: getItems(),
    updatedAt: new Date().toISOString(),
  };
}

function loadFields(data) {
  if (!data) return;
  for (const [key, value] of Object.entries(data)) {
    const el = document.getElementById(key);
    if (el && key !== 'items') el.value = value;
  }
  itemsRoot.innerHTML = '';
  (data.items?.length ? data.items : [{ desc: '', qty: 1, price: 0 }]).forEach(addItem);
  updateTotals();
}

function getSavedInvoices() {
  return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
}

function saveCurrentInvoice() {
  const current = allFields();
  const all = getSavedInvoices();
  const idx = all.findIndex((x) => x.invoiceNumber === current.invoiceNumber);
  if (idx >= 0) all[idx] = current;
  else all.unshift(current);
  localStorage.setItem(STORAGE_KEY, JSON.stringify(all));
  renderSavedList();
  alert('Invoice saved locally on this device.');
}

function deleteInvoice(invoiceNo) {
  const all = getSavedInvoices().filter((x) => x.invoiceNumber !== invoiceNo);
  localStorage.setItem(STORAGE_KEY, JSON.stringify(all));
  renderSavedList();
}

function renderSavedList() {
  const root = document.getElementById('savedList');
  const all = getSavedInvoices();
  if (!all.length) {
    root.innerHTML = '<p>No saved invoices yet.</p>';
    return;
  }
  root.innerHTML = all
    .map(
      (inv) => `<div class="saved-row">
        <div><strong>${inv.invoiceNumber}</strong> • ${inv.customerName || 'No Customer'} • ${inv.invoiceDate}</div>
        <div class="saved-actions">
          <button type="button" data-load="${inv.invoiceNumber}">Load</button>
          <button type="button" data-delete="${inv.invoiceNumber}" class="remove">Delete</button>
        </div>
      </div>`
    )
    .join('');

  root.querySelectorAll('[data-load]').forEach((btn) => {
    btn.addEventListener('click', () => {
      const invoice = all.find((x) => x.invoiceNumber === btn.dataset.load);
      loadFields(invoice);
    });
  });
  root.querySelectorAll('[data-delete]').forEach((btn) => {
    btn.addEventListener('click', () => deleteInvoice(btn.dataset.delete));
  });
}

function resetInvoice() {
  document.getElementById('bizName').value = 'Your Mobile Oil Change';
  document.getElementById('bizPhone').value = '';
  document.getElementById('customerName').value = '';
  document.getElementById('vehicle').value = '';
  invoiceNumber.value = newInvoiceId();
  invoiceDate.value = new Date().toISOString().slice(0, 10);
  itemsRoot.innerHTML = '';
  addItem({ desc: 'Oil Change', qty: 1, price: 89.99 });
  updateTotals();
}

document.getElementById('addItem').addEventListener('click', () => addItem());
document.getElementById('saveInvoice').addEventListener('click', saveCurrentInvoice);
document.getElementById('newInvoice').addEventListener('click', resetInvoice);
document.getElementById('printInvoice').addEventListener('click', () => window.print());

resetInvoice();
renderSavedList();

</script>
  </body>
</html>
