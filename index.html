<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mobile Oil Change Invoices</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <h1>Mobile Oil Change Invoice</h1>
      <p class="sub">Fast, iPad-friendly invoice creator</p>

      <section class="card grid">
        <label>Business Name
          <input id="bizName" value="Your Mobile Oil Change" />
        </label>
        <label>Phone
          <input id="bizPhone" placeholder="(555) 555-5555" />
        </label>
        <label>Invoice #
          <input id="invoiceNumber" />
        </label>
        <label>Date
          <input id="invoiceDate" type="date" />
        </label>
        <label>Customer Name
          <input id="customerName" placeholder="Customer" />
        </label>
        <label>Vehicle
          <input id="vehicle" placeholder="Year Make Model" />
        </label>
      </section>

      <section class="card">
        <h2>Services</h2>
        <div id="items"></div>
        <button id="addItem" type="button">+ Add Item</button>
      </section>

      <section class="card totals">
        <label>Tax %
          <input id="taxRate" type="number" min="0" step="0.01" value="0" />
        </label>
        <p>Subtotal: <strong id="subtotal">$0.00</strong></p>
        <p>Tax: <strong id="tax">$0.00</strong></p>
        <p>Total: <strong id="total">$0.00</strong></p>
      </section>

      <section class="actions">
        <button id="saveDraft" type="button">Save Draft</button>
        <button id="loadDraft" type="button">Load Draft</button>
        <button id="printInvoice" type="button">Print / Save PDF</button>
      </section>
    </main>

    <template id="itemTemplate">
      <div class="item-row">
        <input class="desc" placeholder="Service (e.g., Full Synthetic Oil Change)" />
        <input class="qty" type="number" min="1" value="1" />
        <input class="price" type="number" min="0" step="0.01" value="0" />
        <button class="remove" type="button">Remove</button>
      </div>
    </template>

    <script src="app.js"></script>
  </body>
</html>
